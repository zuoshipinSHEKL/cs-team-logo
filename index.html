<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛事图片展示库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        esl: '#FF4655',
                        pgl: '#00E701',
                        normal: '#6366F1',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .logo-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            @media (min-width: 640px) {
                .logo-grid {
                    grid-template-columns: repeat(3, 1fr);
                }
            }
            @media (min-width: 1024px) {
                .logo-grid {
                    grid-template-columns: repeat(4, 1fr);
                }
            }
            @media (min-width: 1280px) {
                .logo-grid {
                    grid-template-columns: repeat(5, 1fr);
                }
            }
            .logo-item {
                aspect-ratio: 1 / 1;
            }
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- 头部导航 -->
    <header class="sticky top-0 z-50 bg-gray-900/95 backdrop-blur-sm border-b border-gray-800">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <h1 class="text-2xl font-bold bg-gradient-to-r from-esl via-pgl to-normal bg-clip-text text-transparent">
                    <i class="fa fa-shield mr-2"></i>战队LOGO库
                </h1>
                <div class="text-sm text-gray-400">
                    GitHub Pages 托管
                </div>
            </div>
            
            <!-- 分类标签 -->
            <div class="flex gap-2 mt-4 flex-wrap">
                <button onclick="filterCategory('all')" id="btn-all" class="tab-btn active px-4 py-2 rounded-full text-sm font-medium transition-all duration-300 bg-gray-700 hover:bg-gray-600">
                    <i class="fa fa-th mr-1"></i>全部
                </button>
                <button onclick="filterCategory('esl')" id="btn-esl" class="tab-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-300 bg-gray-700 hover:bg-esl/20 hover:text-esl">
                    <i class="fa fa-trophy mr-1"></i>ESL
                </button>
                <button onclick="filterCategory('pgl')" id="btn-pgl" class="tab-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-300 bg-gray-700 hover:bg-pgl/20 hover:text-pgl">
                    <i class="fa fa-gamepad mr-1"></i>PGL
                </button>
                <button onclick="filterCategory('normal')" id="btn-normal" class="tab-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-300 bg-gray-700 hover:bg-normal/20 hover:text-normal">
                    <i class="fa fa-camera mr-1"></i>正常
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 py-8">
        <!-- 自动同步说明 -->
        <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-4 mb-6">
            <div class="flex items-start gap-3">
                <div class="text-green-400 text-xl mt-1">
                    <i class="fa fa-refresh"></i>
                </div>
                <div>
                    <h3 class="font-semibold text-white mb-1">GitHub 自动同步已启用</h3>
                    <p class="text-sm text-gray-400">
                        只需将 LOGO 图片上传到仓库的 <code class="bg-gray-700 px-2 py-0.5 rounded text-green-300">logos/esl/</code>、
                        <code class="bg-gray-700 px-2 py-0.5 rounded text-green-300">logos/pgl/</code>、
                        <code class="bg-gray-700 px-2 py-0.5 rounded text-green-300">logos/normal/</code> 文件夹中，
                        网页会<strong class="text-green-400">自动读取并分类显示</strong>，无需修改代码！
                    </p>
                </div>
            </div>
        </div>

        <!-- 统计信息 -->
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-esl/10 border border-esl/30 rounded-xl p-4 text-center">
                <div class="text-3xl font-bold text-esl" id="esl-count">0</div>
                <div class="text-sm text-gray-400">ESL 战队</div>
            </div>
            <div class="bg-pgl/10 border border-pgl/30 rounded-xl p-4 text-center">
                <div class="text-3xl font-bold text-pgl" id="pgl-count">0</div>
                <div class="text-sm text-gray-400">PGL 战队</div>
            </div>
            <div class="bg-normal/10 border border-normal/30 rounded-xl p-4 text-center">
                <div class="text-3xl font-bold text-normal" id="normal-count">0</div>
                <div class="text-sm text-gray-400">其他战队</div>
            </div>
        </div>

        <!-- LOGO网格 -->
        <div id="gallery-container" class="logo-grid">
            <!-- LOGO将通过JS动态加载 -->
        </div>

        <!-- 空状态 -->
        <div id="empty-state" class="hidden text-center py-20">
            <i class="fa fa-shield text-6xl text-gray-600 mb-4"></i>
            <p class="text-gray-400">该分类下暂无战队LOGO</p>
        </div>
    </main>

    <!-- 图片预览模态框 -->
    <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/90">
        <button onclick="closeModal()" class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300 z-10">
            <i class="fa fa-times"></i>
        </button>
        <button onclick="downloadImage()" class="absolute top-4 left-4 bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg transition-all z-10">
            <i class="fa fa-download mr-2"></i>下载原图
        </button>
        <img id="modal-image" src="" alt="预览图" class="max-w-[90vw] max-h-[90vh] object-contain">
    </div>

    <!-- 页脚 -->
    <footer class="border-t border-gray-800 py-6 mt-12">
        <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
            <p>使用 GitHub Pages 托管 | LOGO 存储于 GitHub 仓库</p>
            <p class="mt-1">✅ 支持 PNG / JPG / SVG 矢量图格式</p>
            <p class="mt-2">
                <a href="https://github.com" target="_blank" class="hover:text-white transition-colors">
                    <i class="fa fa-github mr-1"></i>GitHub
                </a>
            </p>
        </div>
    </footer>

    <script>
        // ==================== GitHub 自动同步配置 ====================
        // 只需要修改这里的配置，上传图片到对应文件夹即可自动同步
        const GITHUB_CONFIG = {
            username: "你的GitHub用户名",           // 例如: "tom"
            repo: "你的仓库名",                      // 例如: "csgo-logos"
            branch: "main",                         // 分支: main 或 master
            basePath: "logos"                       // LOGO存放的根文件夹名
        };
        // 文件夹结构（在仓库中创建）:
        // logos/
        //   ├── esl/       (放ESL赛事战队LOGO)
        //   ├── pgl/       (放PGL赛事战队LOGO)
        //   └── normal/    (放其他赛事战队LOGO)
        // ============================================================

        let imageData = [];
        let currentCategory = 'all';
        let currentImageUrl = '';
        let isLoading = false;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadImagesFromGitHub();
        });

        // 从 GitHub API 自动加载图片
        async function loadImagesFromGitHub() {
            if (GITHUB_CONFIG.username === "你的GitHub用户名") {
                // 演示模式 - 使用示例数据
                loadDemoData();
                showConfigTip();
                return;
            }

            isLoading = true;
            showLoading();

            try {
                const categories = ['esl', 'pgl', 'normal'];
                const allImages = [];

                for (const category of categories) {
                    const apiUrl = `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.basePath}/${category}?ref=${GITHUB_CONFIG.branch}`;
                    
                    try {
                        const response = await fetch(apiUrl);
                        if (!response.ok) continue;
                        
                        const files = await response.json();
                        
                        for (const file of files) {
                            if (isImageFile(file.name)) {
                                allImages.push({
                                    url: file.download_url,
                                    title: file.name.replace(/\.[^/.]+$/, "").replace(/_/g, " "),
                                    category: category,
                                    rawUrl: file.download_url
                                });
                            }
                        }
                    } catch (e) {
                        console.log(`文件夹 ${category} 不存在或加载失败`);
                    }
                }

                imageData = allImages;
                updateCounts();
                renderGallery();
            } catch (error) {
                console.error("GitHub API 加载失败:", error);
                loadDemoData();
            } finally {
                isLoading = false;
                hideLoading();
            }
        }

        // 判断是否为图片文件
        function isImageFile(filename) {
            const ext = filename.toLowerCase().split('.').pop();
            return ['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp'].includes(ext);
        }

        // 演示数据
        function loadDemoData() {
            imageData = [
                { url: "https://picsum.photos/1080/1080?random=1", title: "FaZe Clan", category: "esl" },
                { url: "https://picsum.photos/1080/1080?random=2", title: "Natus Vincere", category: "esl" },
                { url: "https://picsum.photos/1080/1080?random=3", title: "Team Vitality", category: "esl" },
                { url: "https://picsum.photos/1080/1080?random=4", title: "G2 Esports", category: "pgl" },
                { url: "https://upload.wikimedia.org/wikipedia/commons/9/95/Font_Awesome_5_brands_steam.svg", title: "Team Spirit SVG", category: "pgl" },
                { url: "https://picsum.photos/1080/1080?random=6", title: "Heroic", category: "pgl" },
                { url: "https://picsum.photos/1080/1080?random=7", title: "Cloud9", category: "pgl" },
                { url: "https://picsum.photos/1080/1080?random=8", title: "Astralis", category: "normal" },
                { url: "https://picsum.photos/1080/1080?random=9", title: "ENCE", category: "normal" },
                { url: "https://picsum.photos/1080/1080?random=10", title: "MOUZ", category: "normal" },
            ];
            updateCounts();
            renderGallery();
        }

        // 显示配置提示
        function showConfigTip() {
            const header = document.querySelector('header');
            const tip = document.createElement('div');
            tip.className = 'bg-yellow-500/20 border border-yellow-500/50 text-yellow-300 px-4 py-2 text-sm';
            tip.innerHTML = `
                <div class="container mx-auto">
                    <i class="fa fa-info-circle mr-2"></i>
                    <strong>演示模式</strong> - 请在代码中配置 GitHub 用户名和仓库名，上传图片到对应文件夹即可<strong>自动同步</strong>！
                </div>
            `;
            header.parentNode.insertBefore(tip, header.nextSibling);
        }

        // 显示加载状态
        function showLoading() {
            const container = document.getElementById('gallery-container');
            container.innerHTML = `
                <div class="col-span-full text-center py-20">
                    <i class="fa fa-spinner fa-spin text-4xl text-gray-500 mb-4"></i>
                    <p class="text-gray-400">正在从 GitHub 同步 LOGO...</p>
                </div>
            `;
        }

        function hideLoading() {
            // 加载完成
        }

        // 更新统计数字
        function updateCounts() {
            document.getElementById('esl-count').textContent = imageData.filter(img => img.category === 'esl').length;
            document.getElementById('pgl-count').textContent = imageData.filter(img => img.category === 'pgl').length;
            document.getElementById('normal-count').textContent = imageData.filter(img => img.category === 'normal').length;
        }

        // 渲染LOGO画廊
        function renderGallery() {
            const container = document.getElementById('gallery-container');
            const emptyState = document.getElementById('empty-state');
            
            const filteredImages = currentCategory === 'all' 
                ? imageData 
                : imageData.filter(img => img.category === currentCategory);

            if (filteredImages.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            
            container.innerHTML = filteredImages.map((img, index) => `
                <div class="logo-item gallery-item" data-category="${img.category}">
                    <div class="group relative rounded-xl overflow-hidden bg-gray-800 cursor-pointer transform transition-all duration-300 hover:scale-[1.02] hover:shadow-xl hover:shadow-${img.category}/20 h-full flex flex-col" onclick="openModal('${img.url}')">
                        <div class="flex-1 flex items-center justify-center p-4 bg-gray-800/50">
                            <img 
                                src="${img.thumbnail || img.url}" 
                                alt="${img.title}" 
                                class="max-w-full max-h-full object-contain"
                                loading="lazy"
                                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                            >
                            <div class="hidden items-center justify-center w-full h-full text-gray-500">
                                <i class="fa fa-file-image-o text-4xl"></i>
                            </div>
                        </div>
                        <div class="p-3 bg-gray-800 border-t border-gray-700">
                            <h3 class="font-semibold text-white text-sm text-center truncate">${img.title}</h3>
                            <div class="flex items-center justify-center mt-2 gap-2">
                                <span class="px-2 py-0.5 rounded text-xs font-medium ${getCategoryBadgeClass(img.category)}">
                                    ${img.category.toUpperCase()}
                                </span>
                                ${img.url.endsWith('.svg') ? '<span class="px-2 py-0.5 rounded text-xs font-medium bg-yellow-500/30 text-yellow-400">SVG</span>' : ''}
                            </div>
                        </div>
                        <button 
                            onclick="event.stopPropagation(); downloadSingleImage('${img.url}', '${img.title}')"
                            class="absolute top-2 right-2 bg-black/50 hover:bg-white/30 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300"
                        >
                            <i class="fa fa-download"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 获取分类徽章样式
        function getCategoryBadgeClass(category) {
            const classes = {
                esl: 'bg-esl/30 text-esl',
                pgl: 'bg-pgl/30 text-pgl',
                normal: 'bg-normal/30 text-normal'
            };
            return classes[category] || 'bg-gray-500/30 text-gray-300';
        }

        // 分类筛选
        function filterCategory(category) {
            currentCategory = category;
            
            // 更新按钮样式
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-esl', 'bg-pgl', 'bg-normal', 'text-white');
                btn.classList.add('bg-gray-700');
            });
            
            const activeBtn = document.getElementById(`btn-${category}`);
            if (category === 'all') {
                activeBtn.classList.remove('bg-gray-700');
                activeBtn.classList.add('bg-gray-600', 'text-white');
            } else {
                activeBtn.classList.remove('bg-gray-700');
                activeBtn.classList.add(`bg-${category}`, 'text-white');
            }
            
            renderGallery();
        }

        // 打开预览模态框
        function openModal(url) {
            currentImageUrl = url;
            document.getElementById('modal-image').src = url;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
            document.body.style.overflow = '';
        }

        // 下载图片（模态框）
        function downloadImage() {
            const link = document.createElement('a');
            link.href = currentImageUrl;
            link.download = currentImageUrl.split('/').pop() || 'image.jpg';
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 单张图片下载
        function downloadSingleImage(url, title) {
            const link = document.createElement('a');
            link.href = url;
            link.download = title.replace(/\s+/g, '_') + '.jpg';
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ESC 键关闭模态框
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // 点击模态框背景关闭
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
